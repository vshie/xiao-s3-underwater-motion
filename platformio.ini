; XIAO ESP32-S3 Sense - Underwater Motion Detector
; Build + flash entirely from the terminal:
;   pio run                 -> compile
;   pio run -t upload       -> flash the connected board
;   pio device monitor      -> open serial monitor (115200)

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; The XIAO ESP32-S3 enumerates as a native USB-Serial/JTAG device.
; The port name may change after a reset; update if uploads can't find it.
upload_port = /dev/cu.usbmodem112201
monitor_port = /dev/cu.usbmodem112201
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Camera + WiFi + web server need a large app partition.
board_build.partitions = huge_app.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=2
